services:
  app:
    build: .
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./tokens.db:/app/tokens.db
      - ./data:/app/data
      - certs:/etc/letsencrypt
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    ports:
      - "80:80"
    volumes:
      - certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

volumes:
  certs:
